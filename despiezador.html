              <div style={{fontSize:12,color:'#64748b',marginBottom:12}}>Se analizarán {modules.filter(m=>parseInt(m.ancho)).length} módulos con {modules.reduce((s,m)=>{try{return s+calcModule(m,thickness).reduce((a,p)=>a+p.qty,0);}catch(e){return s;}},0)} piezas en hojas {sheet.w}×{sheet.h}mm</div>
              <button onClick={handleOptimizar} disabled={loading}
                style={{width:'100%',padding:11,borderRadius:8,background:loading?'#94a3b8':'#6366f1',color:'#fff',border:'none',cursor:loading?'default':'pointer',fontSize:13,fontWeight:700}}>
                {loading?'Analizando...':'✨ Analizar y optimizar'}
              </button>
            </div>
            {error&&<div style={{background:'#fee2e2',color:'#dc2626',padding:12,borderRadius:8,fontSize:13}}>{error}</div>}
            {respuesta&&(
              <div style={{background:'#fff',borderRadius:12,padding:16,boxShadow:'0 1px 3px #0001'}}>
                <div style={{fontWeight:700,fontSize:13,color:'#0f172a',marginBottom:8}}>Sugerencias de optimización</div>
                <div style={{fontSize:13,color:'#334155',lineHeight:1.7,whiteSpace:'pre-wrap'}}>{respuesta}</div>
              </div>
            )}
          </div>
        )}

        {/* Costos */}
        {modo==='costos'&&(
          <div style={{display:'flex',flexDirection:'column',gap:12}}>
            <button onClick={()=>{setModo(null);setRespuesta(null);}} style={{alignSelf:'flex-start',padding:'4px 10px',borderRadius:6,background:'#f1f5f9',color:'#64748b',border:'1px solid #e2e8f0',cursor:'pointer',fontSize:12}}>← Volver</button>
            <div style={{background:'#fff',borderRadius:12,padding:16,boxShadow:'0 1px 3px #0001'}}>
              <div style={{fontWeight:700,fontSize:13,color:'#0f172a',marginBottom:8}}>💰 Precio por hoja de material</div>
              <input type="number" inputMode="numeric" value={precioPorHoja} onChange={e=>setPrecioPorHoja(e.target.value)}
                placeholder="Ej: 850"
                style={{width:'100%',padding:'10px 12px',borderRadius:8,border:'1.5px solid #cbd5e1',fontSize:16,outline:'none',boxSizing:'border-box',marginBottom:10}}/>
              <button onClick={handleCostos} disabled={loading||!precioPorHoja}
                style={{width:'100%',padding:11,borderRadius:8,background:loading||!precioPorHoja?'#94a3b8':'#6366f1',color:'#fff',border:'none',cursor:loading||!precioPorHoja?'default':'pointer',fontSize:13,fontWeight:700}}>
                {loading?'Calculando...':'✨ Calcular costos y precio'}
              </button>
            </div>
            {error&&<div style={{background:'#fee2e2',color:'#dc2626',padding:12,borderRadius:8,fontSize:13}}>{error}</div>}
            {respuesta&&(
              <div style={{background:'#fff',borderRadius:12,padding:16,boxShadow:'0 1px 3px #0001'}}>
                <div style={{fontWeight:700,fontSize:13,color:'#0f172a',marginBottom:8}}>Estimación de costos</div>
                <div style={{fontSize:13,color:'#334155',lineHeight:1.7,whiteSpace:'pre-wrap'}}>{respuesta}</div>
              </div>
            )}
          </div>
        )}

      </div>
    </div>
  );
}

                <div>
                  <label style={{fontSize:11,fontWeight:600,color:"#64748b",textTransform:"uppercase",letterSpacing:"0.06em",display:"block",marginBottom:3}}>Nombre</label>
                  <input value={mod.nombre} onChange={e=>upd("nombre",e.target.value)} style={{padding:"7px 10px",border:"1.5px solid #cbd5e1",borderRadius:6,fontSize:14,width:"100%",outline:"none",boxSizing:"border-box",fontFamily:"inherit"}}/>
                </div>
                <InputField label="Ancho"       value={mod.ancho}       onChange={v=>upd("ancho",v)}       suffix="mm"/>
                <InputField label="Alto"        value={mod.alto}        onChange={v=>upd("alto",v)}        suffix="mm"/>
                <InputField label="Profundidad" value={mod.profundidad} onChange={v=>upd("profundidad",v)} suffix="mm"/>
                <div style={{display:"flex",gap:8}}>
                  <div style={{flex:1}}><InputField label="Entrepaños" value={mod.repisas}   onChange={v=>upd("repisas",v)}/></div>
                  <div style={{flex:1}}><InputField label="Refuerzos"  value={mod.refuerzos} onChange={v=>upd("refuerzos",v)}/></div>
                </div>
                <InputField label="Lat. Medios" value={mod.lateralesMedios} onChange={v=>upd("lateralesMedios",v)}/>
                {!parseInt(mod.elevacion) && (
                  <label style={{display:"flex",alignItems:"center",gap:8,padding:"8px 11px",borderRadius:8,cursor:"pointer",background:mod.zoclo?"#fef9c3":"#f8fafc",border:"1.5px solid "+(mod.zoclo?"#ca8a04":"#e2e8f0")}}>
                    <input type="checkbox" checked={!!mod.zoclo} onChange={e=>upd("zoclo",e.target.checked)} style={{width:16,height:16,accentColor:"#ca8a04",cursor:"pointer"}}/>
                    <span style={{fontSize:12,fontWeight:600,color:mod.zoclo?"#713f12":"#64748b"}}>🦶 Lleva zóclo</span>
                  </label>
                )}
                {hasData&&<div style={{padding:"9px 11px",background:"#f0fdf4",borderRadius:8,fontSize:11,color:"#14532d",lineHeight:1.8}}>Ancho interno: <b>{anchoInterno} mm</b>&nbsp;·&nbsp;Alto lateral: <b>{altoLateral} mm</b></div>}
              </div>
            )}
            {activeTab==="cajones"&&(
              <div style={{display:"flex",flexDirection:"column",gap:10}}>
                <div style={{display:"flex",gap:8}}>
                  <div style={{flex:1}}><InputField label="Cantidad" value={mod.cantCajones} onChange={v=>upd("cantCajones",v)}/></div>
                  <div style={{flex:1}}><InputField label="Alto cajón" value={mod.altoCajon} onChange={v=>upd("altoCajon",v)} suffix="mm"/></div>
                </div>
                {anchoCajPrev!==null&&parseInt(mod.altoCajon)>0&&(
                  <div style={{padding:"9px 12px",background:"#e0e7ff",borderRadius:8,fontSize:11,color:"#3730a3",lineHeight:1.8}}>
                    <b>Frente/Fondo:</b> {anchoInterno}−25−{thickness*2}−2 = <b>{anchoCajPrev} mm</b><br/>
                    <b>Lateral cajón:</b> {mod.profundidad}−100 = <b>{profCajPrev} mm</b><br/>
                    <b>Base (otro mat.):</b> {anchoInterno-25} × {profCajPrev} mm
                  </div>
                )}
                {!hasData&&<div style={{color:"#94a3b8",fontSize:12}}>Primero ingresá las medidas en Estructura.</div>}
              </div>
            )}
            {activeTab==="puertas"&&(
              <div style={{display:"flex",flexDirection:"column",gap:12}}>
                {/* Puertas */}
                <div style={{padding:"10px 12px",background:"#f0f9ff",borderRadius:8,border:"1px solid #0284c7"}}>
                  <div style={{fontSize:11,fontWeight:700,color:"#0c4a6e",marginBottom:8}}>🚪 Puertas batientes</div>
                  <InputField label="Cantidad de puertas" value={mod.cantPuertas} onChange={v=>upd("cantPuertas",v)}/>
                  {parseInt(mod.cantPuertas)>0&&hasData&&(()=>{
                    const ap=Math.round(parseInt(mod.ancho)/parseInt(mod.cantPuertas))-3;
                    const alt=parseInt(mod.alto)-4;
                    return(
                      <div style={{marginTop:8,padding:"8px 10px",background:"#e0f2fe",borderRadius:6,fontSize:11,color:"#0c4a6e",lineHeight:1.8}}>
                        <b>Cada puerta:</b> {ap} × {alt} mm<br/>
                        <span style={{color:"#0284c7",fontSize:10}}>({mod.ancho}÷{mod.cantPuertas})−3 × {mod.alto}−5</span>
                      </div>
                    );
                  })()}
                </div>
                {/* Frentes de cajón */}
                <div style={{padding:"10px 12px",background:"#fdf4ff",borderRadius:8,border:"1px solid #a855f7"}}>
                  <div style={{fontSize:11,fontWeight:700,color:"#581c87",marginBottom:8}}>🗄 Frentes de cajón</div>
                  {(mod.frentesCajones||[]).map((fc,idx)=>(
                    <div key={idx} style={{display:"flex",gap:8,alignItems:"flex-end",marginBottom:8,padding:"8px 10px",background:"#f8fafc",borderRadius:7,border:"1px solid #e2e8f0"}}>
                      <div style={{flex:1}}>
                        <label style={{fontSize:10,fontWeight:600,color:"#64748b",textTransform:"uppercase",display:"block",marginBottom:3}}>Alto (mm)</label>
                        <input type="number" inputMode="numeric" value={fc.alto} onChange={e=>upd("frentesCajones",(mod.frentesCajones||[]).map((f,i)=>i===idx?{...f,alto:e.target.value}:f))}
                          style={{padding:"6px 8px",border:"1.5px solid #cbd5e1",borderRadius:6,fontSize:13,width:"100%",outline:"none",background:"#fff",fontFamily:"inherit",boxSizing:"border-box"}}/>
                      </div>
                      <div style={{flex:1}}>
                        <label style={{fontSize:10,fontWeight:600,color:"#64748b",textTransform:"uppercase",display:"block",marginBottom:3}}>Cant.</label>
                        <input type="number" inputMode="numeric" value={fc.qty} onChange={e=>upd("frentesCajones",(mod.frentesCajones||[]).map((f,i)=>i===idx?{...f,qty:e.target.value}:f))}
                          style={{padding:"6px 8px",border:"1.5px solid #cbd5e1",borderRadius:6,fontSize:13,width:"100%",outline:"none",background:"#fff",fontFamily:"inherit",boxSizing:"border-box"}}/>
                      </div>
                      {hasData&&parseInt(fc.alto)>0&&(
                        <div style={{fontSize:10,color:"#7c3aed",padding:"0 4px",flexShrink:0,lineHeight:1.4,textAlign:"right"}}>
                          {parseInt(mod.ancho)-4}<br/>×{fc.alto}
                        </div>
                      )}
                      <button onClick={()=>upd("frentesCajones",(mod.frentesCajones||[]).filter((_,i)=>i!==idx))}
                        style={{padding:"6px 9px",background:"#fee2e2",color:"#dc2626",border:"none",borderRadius:6,cursor:"pointer",fontSize:13,fontWeight:700,flexShrink:0}}>×</button>
                    </div>
                  ))}
                  <button onClick={()=>upd("frentesCajones",[...(mod.frentesCajones||[]),{alto:"",qty:"1"}])}
                    style={{width:"100%",padding:8,borderRadius:7,border:"1.5px dashed #c084fc",background:"#fdf4ff",color:"#7c3aed",fontWeight:600,fontSize:13,cursor:"pointer"}}>
                    + Agregar frente
                  </button>
                  {hasData&&(mod.frentesCajones||[]).length>0&&(
                    <div style={{marginTop:6,fontSize:10,color:"#9333ea"}}>Ancho = {parseInt(mod.ancho)-4} mm (ancho módulo − 4)</div>
                  )}
                </div>
                {!hasData&&<div style={{color:"#94a3b8",fontSize:12}}>Primero ingresá las medidas en Estructura.</div>}
              </div>
            )}
          </div>
        </div>

        <div style={{flex:1,minWidth:300,display:"flex",flexDirection:"column",gap:14}}>
          <div style={{background:"#fff",borderRadius:12,padding:18,boxShadow:"0 1px 3px #0001"}}>
            <div style={{fontWeight:700,fontSize:11,color:"#0f172a",marginBottom:12,textTransform:"uppercase",letterSpacing:"0.06em"}}>🖼️ Vista frontal — {mod.nombre}</div>
            {hasData?(
              <div style={{display:"flex",gap:18,flexWrap:"wrap",alignItems:"flex-start"}}>
                <ModuleCanvas mod={mod} thickness={thickness}/>
                <div style={{flex:1,minWidth:160}}>
                  <div style={{fontSize:11,fontWeight:600,color:"#64748b",textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:8}}>Leyenda</div>
                  {Object.entries(TIPO_COLOR).map(([tipo,col])=>(
                    <div key={tipo} style={{display:"flex",alignItems:"center",gap:7,marginBottom:5}}>
                      <span style={{display:"inline-block",width:13,height:13,borderRadius:3,background:col.fill,border:"2px solid "+(col.stroke),flexShrink:0}}/>
                      <span style={{fontSize:11,color:"#334155"}}>{LEYENDA_LABELS[tipo]}</span>
                    </div>
                  ))}
                  <div style={{marginTop:14,padding:11,background:"#f8fafc",borderRadius:8,fontSize:12,lineHeight:1.8}}>
                    <div style={{fontWeight:700,color:"#0f172a",marginBottom:2}}>Medidas internas</div>
                    <div style={{color:"#64748b"}}>Ancho interno</div><div style={{fontWeight:700}}>{anchoInterno} mm</div>
                    <div style={{color:"#64748b"}}>Alto lateral</div><div style={{fontWeight:700}}>{altoLateral} mm</div>
                  </div>
                </div>
              </div>
            ):(
              <div style={{textAlign:"center",padding:"36px 20px",color:"#94a3b8",fontSize:14}}>Ingresá las medidas del módulo para ver la vista</div>
            )}
          </div>

          {curModPieceList}
        </div>
      </div>
    </div>
  );
}


// ── ROOT: controla qué pantalla mostrar ──
function App() {
  const db = usePreciosDB();
  const [pantalla, setPantalla] = useState("bienvenida");
  const [proyectoIA, setProyectoIA] = useState(null);

  function handleProyectoListo(proyecto) {
    setProyectoIA(proyecto);
    setPantalla("app");
  }

  if (pantalla === "bienvenida") {
    return <Bienvenida db={db} onProyectoListo={handleProyectoListo}/>;
  }

  return <AppPrincipal proyectoIA={proyectoIA} onVolverBienvenida={()=>setPantalla("bienvenida")}/>;
}

const container=document.getElementById('root');
const root=ReactDOM.createRoot(container);
root.render(React.createElement(App));
document.getElementById('loading').style.display='none';
</script>
</body>
</html>
